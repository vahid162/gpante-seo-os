# Reusable Run state template. This is not an actual Run state.
# Copy this file into a correctly named Run directory before use.
# The run_id must match the Run directory name exactly.
# Allowed status and workflow_stage values are defined in ../../workflows/status-definitions.md.
# production_write remains false unless an explicitly approved Task authorizes a manual change.

run_id: YYYY-MM-DD-short-slug
status: initialized
workflow_stage: intake

mode:
  audit_only: true
  production_write: false

approval:
  required: true
  status: pending

owner: OWNER_REQUIRED

created_at: YYYY-MM-DD
updated_at: YYYY-MM-DD
